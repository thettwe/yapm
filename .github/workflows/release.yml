name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish image to GHCR
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Compute image tags
        id: tags
        env:
          RELEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
          PATCH: ${{ needs.release-please.outputs.patch }}
        run: |
          set -euo pipefail
          image="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          tags="${image}:edge"
          tags="${tags},${image}:sha-${GITHUB_SHA::7}"
          if [ "$RELEASE_CREATED" = "true" ]; then
            tags="${tags},${image}:${MAJOR}.${MINOR}.${PATCH}"
            tags="${tags},${image}:${MAJOR}.${MINOR}"
            tags="${tags},${image}:${MAJOR}"
            tags="${tags},${image}:stable"
            tags="${tags},${image}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VITE_ZERO_CACHE_URL=http://localhost:4848
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
