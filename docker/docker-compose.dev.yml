name: yapm-dev

services:
  postgres:
    image: postgres:18
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yapm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yapm}
      POSTGRES_DB: ${POSTGRES_DB:-yapm}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5440}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yapm} -d ${POSTGRES_DB:-yapm}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  zero-cache:
    image: ${ZERO_IMAGE:-rocicorp/zero:1.8.0}
    environment:
      ZERO_UPSTREAM_DB: postgres://${POSTGRES_USER:-yapm}:${POSTGRES_PASSWORD:-yapm}@postgres:5432/${POSTGRES_DB:-yapm}
      ZERO_CVR_DB: postgres://${POSTGRES_USER:-yapm}:${POSTGRES_PASSWORD:-yapm}@postgres:5432/${POSTGRES_DB:-yapm}
      ZERO_CHANGE_DB: postgres://${POSTGRES_USER:-yapm}:${POSTGRES_PASSWORD:-yapm}@postgres:5432/${POSTGRES_DB:-yapm}
      ZERO_REPLICA_FILE: /data/replica.db
      ZERO_ADMIN_PASSWORD: ${ZERO_ADMIN_PASSWORD:-devpassword}
      # The Hono server runs on the host under tsx watch, not in a container.
      ZERO_QUERY_URL: http://host.docker.internal:${YAPM_HOST_PORT:-3000}/api/zero/query
      ZERO_MUTATE_URL: http://host.docker.internal:${YAPM_HOST_PORT:-3000}/api/zero/mutate
      ZERO_ENABLE_CRUD_MUTATIONS: "false"
      ZERO_PORT: 4848
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ZERO_CACHE_HOST_PORT:-4848}:4848"
    volumes:
      - zero-replica:/data
    stop_grace_period: 10m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4848/keepalive"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  pgdata:
  zero-replica:
