schema: spec-driven

context: |
  yapm ("Yet Another Project Management") — open-source (AGPL-3.0, 100% open, no ee/)
  project management tool whose wedge is PM + engineering quality in ONE work graph:
  issue ↔ PR ↔ CI run ↔ deploy ↔ incident. Metrics (DORA, review health) are free
  views over native data, never a bolt-on. Primary audience: small self-hosting dev
  teams (2–20). Read VISION.md (why) and TECHSTACK.md (with what) before proposing.

  Tech stack: TypeScript 7 (native tsc) on Node 24 LTS; Zero (Rocicorp) sync engine;
  Postgres ≥15 (only database — also jobs via pg-boss and FTS search); React 19 +
  Vite 8 SPA (never Next.js — Zero has no SSR); TanStack Router; Tailwind v4 + Radix
  scaffolded with shadcn/ui; Hono; Drizzle ORM (packages/schema is the single source
  of truth → drizzle-zero); better-auth (SSO free, never paywalled); TipTap v3.
  Monorepo: pnpm 11 workspaces + catalogs, Turborepo; apps/{web,server,docs},
  packages/{schema,ui,api,config}.

  Hard constraints every spec must respect:
  - Self-host = exactly 3 containers (app, zero-cache, postgres). No Redis, no
    Elasticsearch, no MinIO. Local FS attachments with optional S3.
  - Sub-100ms interaction budget; keyboard-first; command palette is a core surface.
  - Shared Zero mutators live in packages/schema (client and server import the same
    function). ZQL confined to packages/schema (ElectricSQL fallback guard).
  - Client-generated UUIDv7 primary keys (optimistic mutations mint IDs client-side).
  - Metrics are team-level only — no individual leaderboards or per-person rankings.
  - Free means free: no seat caps, no SSO tax, no feature gates, no upsell UI.
  - Viewer role is free and unlimited, modeled in the schema from day one.
  - No TS-Compiler-API tools (gone in TS7 Go build); Biome for lint/format.

  Conventions: Conventional Commits + DCO sign-off; strict semver; auto-migrations
  on boot (forward-only); env-only config validated with Zod; REST API under /api/v1
  additive-only within a major.

rules:
  proposal:
    - Always include a "Non-goals" section
    - State which vision principle(s) the change serves
  specs:
    - Requirements must include concrete scenarios covering keyboard-only usage
      where UI is involved
    - Any new table/entity spec must state its place in the work graph and its
      sync/permission story (who can see which rows)
  tasks:
    - Order tasks so the app remains runnable after every task
